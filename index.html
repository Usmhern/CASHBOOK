<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKURA GENERAL ENTERPRISE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:black; color:#fff; min-height:100vh; overflow-x: hidden; }

        /* HEADER STYLES */
        header { 
            position: fixed; top: 60; width: 100%; background: #000; 
            padding: 10px; text-align: center; z-index: 1000; border-bottom: 2px solid #00c6ff;
            display: flex; flex-direction: column; align-items: center;
        }
        .main-logo { width: 180px; height: 250; margin-bottom: 5px; }
        .sub-heading { color: #ffffff; font-size: 14px; font-weight: bold; letter-spacing: 3px; }

        /* LOGIN PAGE */
        #loginPage { display: flex; height: 100vh; justify-content: center; align-items: center; background: #141e30; }
        .login-box { background:#1c2e4a; padding:30px; border-radius:12px; width:320px; text-align: center; border: 1px solid #333; }
        
        /* APP STRUCTURE */
        #app { display: none; }
        .page { display: none; padding: 20px; padding-top: 180px; max-width: 900px; margin: auto; }
        .active-page { display: block; }

        /* SIDEBAR */
        .menu-btn { position: fixed; top: 80px; left: 15px; z-index: 1100; font-size: 24px; cursor: pointer; background: #00c6ff; padding: 5px 12px; border-radius: 4px; color: #000; }
        .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: #0a0f18; transition: 0.3s; z-index: 1500; padding-top: 80px; }
        .sidebar a { display: block; padding: 15px 25px; color: #fff; text-decoration: none; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar a:hover { background: #00c6ff; color: #000; }
        .overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1400; }

        /* UI ELEMENTS */
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; outline: none; }
        input { background: transparent; color: #fff; border-bottom: 1px solid #333; border-top:none; border-left:none; border-right:none;}
        button { background: #00c6ff; font-weight: bold; cursor: pointer; color: #000; }
        
        /* TABLE & DASHBOARD */
        .dashboard { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { flex: 1; background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; }
        .table-wrap { overflow-x: auto; background: #fff; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; color: #000; min-width: 600px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 13px; }
        th { background: #243b55; color: #fff; }

        /* MODALS (Login & Actions) */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c2e4a; padding: 25px; border-radius: 12px; z-index: 2000; display: none; width: 90%; max-width: 320px; text-align: center; border-width: 2px; border-style: solid; }
        .modal h3 { margin-bottom: 10px; }
        .modal-icon { font-size: 40px; margin-bottom: 10px; }

        /* TOAST */
        #toast { position: fixed; top: 70px; right: 20px; padding: 15px 25px; border-radius: 5px; display: none; z-index: 3000; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="loginPage">
    <div class="login-box">
        <img src="akura.png" class="main-logo" style="width: 80px;">
        <h2 style="margin-bottom:20px;">Admin Login</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="checkLogin()">LOGIN</button>
    </div>
</div>
<br><br><br>
<div id="app">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <header>
        <img src="akura.png" class="main-logo">
        <h3 style="color:#00c6ff">AKURA GENERAL ENTERPRISE</h3>
        <p class="sub-heading">CASHBOOK</p>
    </header>

    <div class="sidebar" id="sidebar">
        <a onclick="showPage('formPage')">➕ Add New Record</a>
        <a onclick="showPage('tablePage')">📊 View Records</a>
        <a onclick="showPage('chartPage')">📈 Statistics Chart</a>
        <a onclick="downloadPDF()">🧾 Download PDF</a>
        <a onclick="logout()" style="color: #ff4d4d; margin-top: 20px;">🚪 Logout</a>
    </div>

    <div id="formPage" class="page">
        <div style="background:rgba(255,255,255,0.05); padding: 25px; border-radius: 10px;">
            <h3>Register Sale</h3>
            <input id="custName" placeholder="Customer Name">
            <input id="prodName" placeholder="Product">
            <input id="totalAmt" type="number" placeholder="Total Amount (₦)">
            <input id="paidAmt" type="number" placeholder="Amount Paid (₦)">
            <button onclick="saveRecord()">SAVE RECORD</button>
        </div>
    </div>
<br><br>
    <div id="tablePage" class="page">
        <div class="dashboard">
            <div class="card">Total Paid<br><b id="sumPaid" style="color:green">₦0</b></div>
            <div class="card">Total Debt<br><b id="sumDebt" style="color:red">₦0</b></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>SN</th><th>NAME</th><th>PRODUCT</th><th>AMOUNT</th><th>PAID</th><th>DEBT</th><th>DATE</th><th>ACTION</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="chartPage" class="page">
        <div style="background:black; padding: 20px; border-radius: 10px;">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<div id="alertModal" class="modal">
    <div id="modalIcon" class="modal-icon"></div>
    <h3 id="modalTitle"></h3>
    <p id="modalMsg" style="color:#ccc; font-size:14px; margin-bottom:15px;"></p>
    <div id="modalActionArea"></div>
</div>

<script>
    const ADMIN_USER = "Admin";
    const ADMIN_PASS = "1234";
    let records = JSON.parse(localStorage.getItem("akura_records")) || [];
    let deleteIdx = null, editIdx = null, chartObj = null;

    // Toast Logic
    function showToast(msg, bg) {
        const t = document.getElementById("toast");
        t.innerText = msg; t.style.background = bg; t.style.display = "block";
        setTimeout(() => t.style.display="none", 2500);
    }

    // Custom Modal System
    function openModal(title, msg, icon, borderColor, actionHtml) {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalMsg").innerText = msg;
        document.getElementById("modalIcon").innerText = icon;
        const modal = document.getElementById("alertModal");
        modal.style.borderColor = borderColor;
        modal.style.display = "block";
        document.getElementById("overlay").style.display = "block";
        document.getElementById("modalActionArea").innerHTML = actionHtml;
    }

    function closeAllModals() {
        document.getElementById("alertModal").style.display = "none";
        document.getElementById("overlay").style.display = "none";
        toggleMenu(false);
    }

    // LOGIN LOGIC
    function checkLogin() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;

        if (u === ADMIN_USER && p === ADMIN_PASS) {
            openModal("✓ Successful", "Identity Verified.", "✅", "#00c853", `<button onclick="enterApp()">OK</button>`);
        } else if (u === ADMIN_USER && p !== ADMIN_PASS) {
            openModal("🔐 Password Incorrect", "Please check your password.", "❌", "#ff4d4d", `<button onclick="closeAllModals()">RETRY</button>`);
        } else if (u !== ADMIN_USER && p === ADMIN_PASS) {
            openModal("👤 Username Incorrect", "Please check your username.", "❌", "#ff4d4d", `<button onclick="closeAllModals()">RETRY</button>`);
        } else {
            openModal("Incorrect Details", "Both fields are wrong.", "❌", "#ff4d4d", `<button onclick="closeAllModals()">RETRY</button>`);
        }
    }

    function enterApp() {
        localStorage.setItem("isLoggedIn", "true");
        location.reload();
    }

    if(localStorage.getItem("isLoggedIn") === "true") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";
        showPage('tablePage');
    }

    function logout() { localStorage.removeItem("isLoggedIn"); location.reload(); }

    // NAV
    function toggleMenu(open) {
        document.getElementById("sidebar").style.left = open ? "0" : "-260px";
        document.getElementById("overlay").style.display = open ? "block" : "none";
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        toggleMenu(false);
        if(id === 'tablePage') renderTable();
        if(id === 'chartPage') renderChart();
    }

    // RECORDS
    function saveRecord() {
        const total = Number(totalAmt.value), paid = Number(paidAmt.value);
        if(!custName.value || total <= 0) return alert("Fill fields correctly");
        records.push({ name: custName.value, product: prodName.value, total: total, paid: paid, debt: total - paid, date: new Date().toLocaleDateString() });
        localStorage.setItem("akura_records", JSON.stringify(records));
        custName.value = prodName.value = totalAmt.value = paidAmt.value = "";
        showToast("✓ Record Saved", "#00c853");
        showPage('tablePage');
    }

    function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        let sP = 0, sD = 0;
        records.forEach((r, i) => {
            sP += r.paid; sD += r.debt;
            tbody.innerHTML += `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.product}</td><td>₦${r.total}</td><td>₦${r.paid}</td><td style="color:red">₦${r.debt}</td><td>${r.date}</td>
            <td><button style="width:auto; background:#eee; padding:5px 8px" onclick="openEdit(${i})">✏️</button>
            <button style="width:auto; background:#eee; color:white; padding:5px 8px" onclick="askDelete(${i})">❌</button></td></tr>`;
        });
        document.getElementById("sumPaid").innerText = "₦" + sP;
        document.getElementById("sumDebt").innerText = "₦" + sD;
    }

    // EDIT/DELETE POPUPS
    function openEdit(i) {
        editIdx = i;
        const currentDebt = records[i].debt;
        openModal("Edit Debt", "Adjust remaining balance.", "✏️", "#ffa500", 
        `<input id="newD" type="number" value="${currentDebt}" style="background:#000; color:#fff; border:1px solid #333; margin-bottom:10px;"><button onclick="saveEdit()">UPDATE</button>`);
    }

    function saveEdit() {
        const nD = Number(document.getElementById("newD").value);
        records[editIdx].debt = nD;
        records[editIdx].paid = records[editIdx].total - nD;
        localStorage.setItem("akura_records", JSON.stringify(records));
        closeAllModals(); renderTable();
        showToast("✓ Debt Updated", "#ffa500");
    }

    function askDelete(i) {
        deleteIdx = i;
        openModal("Are you sure?", `Delete ${records[i].name}?`, "⚠️", "#ff4d4d", `<button style="background:red; color:white;" onclick="confirmDelete()">YES, DELETE</button>`);
    }

    function confirmDelete() {
        records.splice(deleteIdx, 1);
        localStorage.setItem("akura_records", JSON.stringify(records));
        closeAllModals(); renderTable();
        showToast("✓ Deleted", "#ff4d4d");
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("AKURA GENERAL ENTERPRISE - CASHBOOK", 10, 10);
        const data = records.map((r, i) => [i+1, r.name, r.product, r.total, r.paid, r.debt, r.date]);
        doc.autoTable({ head: [['SN', 'NAME', 'PRODUCT', 'AMOUNT', 'PAID', 'DEBT', 'DATE']], body: data });
        doc.save("Akura_Cashbook.pdf");
        showToast("PDF Downloaded", "#2196F3");
        toggleMenu(false);
    }

    function renderChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        let p = 0, d = 0;
        records.forEach(r => { p += r.paid; d += r.debt; });
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, { type: 'pie', data: { labels: ['Paid', 'Debt'], datasets: [{ data: [p, d], backgroundColor: ['#0ae', 'orange'] }] } });
    }
</script>
</body>
</html>
