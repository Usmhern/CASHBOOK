<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AKURA GENERAL ENTERPRISES</title>
<link rel="icon" href="logo.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#141e30;color:#fff}

/* LOGIN */
#loginPage{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#243b55;
  padding:25px;
  border-radius:10px;
  width:280px;
}

/* INPUTS */
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

button{
  background:#00c6ff;
  cursor:pointer;
  font-weight:bold;
}

/* MENU */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:24px;
  z-index:2000;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#000;
  padding-top:60px;
  transition:0.3s;
  z-index:1500;
}

.sidebar a{
  display:block;
  padding:15px;
  color:#fff;
  text-decoration:none;
}

.sidebar a:hover{background:#00c6ff;color:#000}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  z-index:1400;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
}

.logo{
  width:60px;
  border-radius:50%;
}

/* FORM */
.container{
  max-width:400px;
  margin:15px auto;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:10px;
}

/* TABLE */
.table-page{display:none;padding:10px}

/* DASHBOARD */
.dashboard{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.card{
  flex:1;
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:6px;
  text-align:center;
}

/* TOP BAR */
.top-bar{
  display:flex;
  gap:5px;
  margin-top:10px;
}

.top-bar input{
  flex:1;
}

.top-actions{
  display:flex;
  gap:5px;
}

.top-actions button{
  padding:6px 10px;
  font-size:11px;
  width:auto;
}

/* CHART */
.chart-box{
  max-width:220px;
  margin:10px auto;
}

/* TABLE */
table{
  width:100%;
  background:#fff;
  color:#000;
  margin-top:10px;
  border-collapse:collapse;
  min-width:700px;
}

th,td{
  padding:6px;
  border:1px solid #ccc;
  text-align:center;
  font-size:12px;
}

td[contenteditable]{background:#f9f9f9}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h3>Admin Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="sidebar" id="sidebar">
  <a onclick="showForm()">➕ Add Record</a>
  <a onclick="showTable()">📊 View Records</a>
  <a onclick="downloadPDF()">🧾 Download PDF</a>
  <a onclick="logout()">🚪 Logout</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<header>
  <img src="logo.png" class="logo">
  <h3>AKURA GENERAL ENTERPRISES</h3>
</header>

<!-- FORM -->
<div class="container" id="formPage">
  <input id="name" placeholder="Name">
  <input id="product" placeholder="Product / Service">
  <input id="amount" type="number" placeholder="Amount (₦)">
  <input id="paid" type="number" placeholder="Paid (₦)">
  <button onclick="saveData()">Save</button>
</div>

<!-- TABLE -->
<div class="table-page" id="tablePage">

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card">Total Paid<br><b id="tPaid">₦0</b></div>
  <div class="card">Total Debt<br><b id="tDebt">₦0</b></div>
</div>

<!-- CHART -->
<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<!-- SEARCH + SORT -->
<div class="top-bar">
  <input id="search" placeholder="Search..." onkeyup="searchTable()">

  <div class="top-actions">
    <button onclick="sortAZ()">A-Z</button>
    <button onclick="loadData()">Reset</button>
  </div>
</div>

<!-- TABLE -->
<div style="overflow-x:auto">
<table>
<thead>
<tr>
<th>SN</th>
<th>Name</th>
<th>Product</th>
<th>Amount</th>
<th>Paid</th>
<th>Remaining</th>
<th>Total</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>
</div>

</div>
</div>

<script>
const ADMIN_USER="admin";
const ADMIN_PASS="1234";

let records=JSON.parse(localStorage.getItem("records"))||[];
let chart;

/* LOGIN */
if(localStorage.getItem("login")==="true") showApp();

function login(){
  if(user.value===ADMIN_USER && pass.value===ADMIN_PASS){
    localStorage.setItem("login","true");
    showApp();
  }else alert("Wrong login");
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
}

/* MENU */
function openMenu(){
  sidebar.style.left="0";
  overlay.style.display="block";
}

function closeMenu(){
  sidebar.style.left="-260px";
  overlay.style.display="none";
}

/* NAV */
function showForm(){
  formPage.style.display="block";
  tablePage.style.display="none";
  closeMenu();
}

function showTable(){
  formPage.style.display="none";
  tablePage.style.display="block";
  loadData();
  closeMenu();
}

/* SAVE */
function saveData(){
  let now=new Date();

  let amountVal=Number(amount.value);
  let paidVal=Number(paid.value);
  let remainingVal=amountVal-paidVal;

  let data={
    name:name.value.trim(),
    product:product.value.trim(),
    amount:amountVal,
    paid:paidVal,
    remaining:remainingVal>0?remainingVal:0,
    total:paidVal,
    date:now.toLocaleDateString()
  };

  records.push(data);
  updateAll();
}

/* UPDATE */
function updateAll(){
  localStorage.setItem("records",JSON.stringify(records));
  loadData();
}

/* LOAD TABLE */
function loadData(){
  tbody.innerHTML="";
  let paidT=0,debtT=0;

  records.forEach((r,i)=>{
    paidT+=Number(r.paid||0);
    debtT+=Number(r.remaining||0);

    tbody.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${r.name||""}</td>
      <td>${r.product||""}</td>
      <td>₦${r.amount}</td>
      <td>₦${r.paid}</td>
      <td contenteditable onblur="editRemain(${i},this)">
        ${r.remaining ? "₦"+r.remaining : ""}
      </td>
      <td>₦${r.total}</td>
      <td>${r.date||""}</td>
      <td><button onclick="del(${i})">Del</button></td>
    </tr>`;
  });

  tPaid.innerText="₦"+paidT;
  tDebt.innerText="₦"+debtT;

  drawChart(paidT,debtT);
}

/* EDIT REMAINING */
function editRemain(i,el){
  let val=Number(el.innerText.replace(/₦/g,""));
  if(isNaN(val))return;

  records[i].remaining=val;
  records[i].total=records[i].paid+val;

  updateAll();
}

/* DELETE */
function del(i){
  records.splice(i,1);
  updateAll();
}

/* SEARCH */
function searchTable(){
  let v=search.value.toLowerCase();
  document.querySelectorAll("tbody tr").forEach(r=>{
    r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
  });
}

/* SORT */
function sortAZ(){
  records.sort((a,b)=>a.name.localeCompare(b.name));
  updateAll();
}

/* PDF */
function downloadPDF(){
  let w=window.open("");
  let html=`<h2 style="text-align:center;">AKURA GENERAL ENTERPRISES</h2>
  <table border="1" style="width:100%;border-collapse:collapse;text-align:center;">
  <tr><th>SN</th><th>Name</th><th>Product</th><th>Amount</th><th>Paid</th><th>Remaining</th><th>Total</th><th>Date</th></tr>`;

  records.forEach((r,i)=>{
    html+=`
    <tr>
      <td>${i+1}</td>
      <td>${r.name}</td>
      <td>${r.product}</td>
      <td>₦${r.amount}</td>
      <td>₦${r.paid}</td>
      <td>${r.remaining?"₦"+r.remaining:""}</td>
      <td>₦${r.total}</td>
      <td>${r.date}</td>
    </tr>`;
  });

  html+="</table>";
  w.document.write(html);
  w.print();
}

/* CHART */
function drawChart(paid,debt){
  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"doughnut",
    data:{
      labels:["Income","Debt"],
      datasets:[{data:[paid,debt],backgroundColor:["green","red"]}]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });
}
</script>

</body>
</html>
