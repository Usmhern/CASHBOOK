<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKURA GENERAL ENTERPRISE</title>
    <link rel="icon" type="image/png" href="akura.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:black; color:#fff; min-height:100vh; overflow-x: hidden; }

        /* RESTORED ORIGINAL LOGIN & OVERLAY */
        #loginPage { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 5000; display: flex; 
            justify-content: center; align-items: center; 
        }
        .login-box { 
            background: #111; padding: 40px; border-radius: 10px; 
            border: 1px solid #00c6ff; width: 320px; text-align: center; 
        }
        
        #app { display: none; }
        .page { display: none; padding: 20px; padding-top: 220px; max-width: 1000px; margin: auto; }
        .active-page { display: block; }
        
        header { 
            position: fixed; top: 0; width: 100%; background: #000; padding: 10px; 
            text-align: center; z-index: 1000; border-bottom: 2px solid #00c6ff;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .main-logo { width: 180px; height: 120px; margin-bottom: 5px; }
        .sub-heading { color: #ffffff; font-size: 14px; font-weight: bold; letter-spacing: 2px; margin: 0; }
        
        .menu-btn { 
            position: fixed; top: 60px; left: 17px; z-index: 1100; 
            font-size: 25px; cursor: pointer; background: #00c6ff; 
            padding: 5px 12px; border-radius: 4px; color: #000;
        }

        .sidebar { 
            position: fixed; top: 0; left: -260px; width: 260px; height: 100%; 
            background: #0a0f18; transition: 0.3s; z-index: 1500; padding-top: 60px; 
            border-right: 1px solid #333;
        }
        .sidebar a { display: block; padding: 15px 25px; color: #fff; text-decoration: none; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar a:hover { background: #00c6ff; color: #000; }
        .sidebar a i { margin-right: 15px; width: 20px; text-align: center; color: #00c6ff; }
        
        /* Sidebar/Modal Overlay */
        .overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1400; }

        .container { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 10px; }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; border: none; border-bottom: 1px solid #333; 
            background: transparent; color: #fff; outline:none;
        }
        option { background: #1c2e4a; color: white; }
        button { width: 100%; padding: 12px; background: #00c6ff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .dashboard { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { flex: 1; background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; }
        
        .table-wrap { overflow-x: auto; background: #fff; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; color: #000; min-width: 900px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 12px; }
        th { background: #243b55; color: #fff; }

        /* Progress Bar Styling */
        .progress-bg { background: #eee; height: 8px; border-radius: 4px; width: 100%; margin-top: 5px; overflow: hidden; }
        .progress-fill { background: #00c853; height: 100%; border-radius: 4px; transition: 0.5s; }

        .btn-msg { text-decoration: none; font-size: 10px; padding: 4px 6px; border-radius: 4px; background: #25D366; color: #fff; font-weight: bold; }
        .btn-edit, .btn-del { background: #f0f0f0; border:none; padding: 6px; cursor: pointer; border-radius: 4px; color: #333; }

        #editModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; padding: 25px; border-radius: 12px; z-index: 2000;
            display: none; width: 90%; max-width: 350px; border: 1px solid #00c6ff; text-align: center;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .blink-green { color: #00ff00 !important; animation: blink 1s linear infinite; font-weight: bold; }
        .blink-red { color: #ff0000 !important; animation: blink 1s linear infinite; font-weight: bold; }
        #toast { position: fixed; top: 50px; right: 40px; padding: 15px 25px; border-radius: 5px; display: none; z-index: 6000; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="loginPage">
    <div class="login-box">
        <h2 style="color:#00c6ff; margin-bottom:20px;">AKURA ADMIN</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">ENTER SYSTEM</button>
    </div>
</div>

<div id="app">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>

    <div class="sidebar" id="sidebar">
        <a onclick="showPage('formPage')"><i class="fas fa-plus-circle"></i> Add New Sale</a>
        <a onclick="showPage('tablePage')"><i class="fas fa-table"></i> Records Ledger</a>
        <a onclick="showPage('chartPage')"><i class="fas fa-chart-pie"></i> Business Health</a>
        <a onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Download PDF</a>
        <a onclick="logout()" style="color: #ff4d4d; margin-top: 20px;"><i class="fas fa-power-off"></i> Logout</a>
    </div>

    <header>
        <img src="akura.png" alt="AKURA" class="main-logo">
        <h3 style="color:#00c6ff; margin: 0;">AKURA GENERAL ENTERPRISE</h3>
        <p class="sub-heading">PROFESSIONAL CASHBOOK</p>
    </header>

    <div id="formPage" class="page">
        <div class="container">
            <h3>REGISTER TRANSACTION</h3>
            <input id="custName" placeholder="Customer Name">
            <input id="custPhone" placeholder="WhatsApp/Phone Number">
            <select id="msgPref">
                <option value="whatsapp">Prefer WhatsApp</option>
                <option value="sms">Prefer SMS</option>
            </select>
            <input id="prodName" placeholder="Product/Service">
            <input id="totalAmt" type="number" placeholder="Total Amount (₦)">
            <input id="paidAmt" type="number" placeholder="Amount Paid (₦)">
            <button onclick="saveRecord()">CONFIRM SALE</button>
        </div>
    </div>

    <div id="tablePage" class="page">
        <div class="dashboard">
            <div class="card">TOTAL CASH<br><b id="sumPaid" style="color:green">₦0</b></div>
            <div class="card">OUTSTANDING<br><b id="sumDebt" style="color:red">₦0</b></div>
        </div>
        <input id="searchBox" placeholder="Search customer or service..." onkeyup="filterTable()">
        <div class="table-wrap">
            <table id="recordsTable">
                <thead>
                    <tr>
                        <th>SN</th><th>CLIENT</th><th>SERVICE</th><th>TOTAL</th><th>PROGRESS</th><th>DEBT</th><th>DATE</th><th>NOTIFY</th><th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="chartPage" class="page">
        <div class="container" style="background:black; border: 1px solid #333; text-align: center;">
            <h4 style="margin-bottom:20px; color:#00c6ff;">Financial Ratio Analysis</h4>
            <div style="height: 350px; position: relative;">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="editModal">
    <h3>Update Debt Balance</h3>
    <p id="editLabel" style="font-size:12px; margin:10px 0; color:#aaa;"></p>
    <input id="newDebtInput" type="number" placeholder="Enter Remaining Debt">
    <button onclick="confirmEdit()">UPDATE</button>
    <button onclick="closeEdit()" style="background:#444; color:white;">CANCEL</button>
</div>

<script>
    const AUTH_USER = "Admin", AUTH_PASS = "1234";
    let records = JSON.parse(localStorage.getItem("akura_records")) || [];
    let editIdx = null, chartObj = null;

    function toast(m, b="#00c853") {
        const t = document.getElementById("toast"); t.innerText = m; t.style.background = b; t.style.display = "block";
        setTimeout(() => t.style.display="none", 2500);
    }

    function login() {
        if(user.value === AUTH_USER && pass.value === AUTH_PASS) {
            localStorage.setItem("isLoggedIn", "true");
            loginDone();
        } else { toast("Access Denied", "red"); }
    }
    function loginDone() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";
        showPage('tablePage');
    }
    if(localStorage.getItem("isLoggedIn") === "true") loginDone();
    function logout() { localStorage.removeItem("isLoggedIn"); location.reload(); }

    function toggleMenu(open) {
        document.getElementById("sidebar").style.left = open ? "0" : "-260px";
        document.getElementById("overlay").style.display = open ? "block" : "none";
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        toggleMenu(false);
        if(id === 'tablePage') renderTable();
        if(id === 'chartPage') renderChart();
    }

    function saveRecord() {
        const total = Number(totalAmt.value), paid = Number(paidAmt.value);
        if(!custName.value || total <= 0) return toast("Invalid Entry", "red");
        records.push({
            name: custName.value, phone: custPhone.value, pref: msgPref.value,
            product: prodName.value, total: total, paid: paid, debt: total - paid,
            date: new Date().toLocaleDateString(), timestamp: Date.now()
        });
        localStorage.setItem("akura_records", JSON.stringify(records));
        toast("Sale Registered!");
        ["custName","custPhone","prodName","totalAmt","paidAmt"].forEach(id => document.getElementById(id).value = "");
        showPage('tablePage');
    }

    function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        let sP = 0, sD = 0;

        records.forEach((r, i) => {
            sP += r.paid; sD += r.debt;
            const progress = (r.paid / r.total) * 100;
            const isLate = (Date.now() - r.timestamp) > 604800000 && r.debt > 0;
            
            let msg = `Hello ${r.name}, this is Akura General Enterprise. Reminder for debt: N${r.debt}.`;
            let link = r.pref === 'whatsapp' ? `https://wa.me/${r.phone}?text=${encodeURIComponent(msg)}` : `sms:${r.phone}?body=${encodeURIComponent(msg)}`;

            tbody.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td><b>${r.name}</b></td>
                    <td>${r.product}</td>
                    <td>₦${r.total}</td>
                    <td>
                        <div style="font-size:9px">${Math.round(progress)}%</div>
                        <div class="progress-bg"><div class="progress-fill" style="width:${progress}%"></div></div>
                    </td>
                    <td style="color:${r.debt > 0 ? 'red' : 'green'}">₦${r.debt}</td>
                    <td>${r.date}</td>
                    <td>
                        ${r.debt > 0 ? `<a href="${link}" class="btn-msg" style="${isLate ? 'background:#d32f2f' : ''}">${isLate ? '⏰' : ''} ${r.pref === 'whatsapp' ? 'WA' : 'SMS'}</a>` : '✅'}
                    </td>
                    <td>
                        <button class="btn-edit" onclick="openEdit(${i})"><i class="fas fa-edit"></i></button>
                        <button class="btn-del" onclick="deleteRec(${i})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });
        document.getElementById("sumPaid").innerText = "₦" + sP;
        document.getElementById("sumDebt").innerText = "₦" + sD;
        danger();
    }

    function openEdit(i) {
        editIdx = i;
        document.getElementById("editLabel").innerText = `Adjusting balance for ${records[i].name}`;
        document.getElementById("newDebtInput").value = records[i].debt;
        document.getElementById("editModal").style.display = "block";
        document.getElementById("overlay").style.display = "block";
    }

    function closeEdit() { document.getElementById("editModal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

    function confirmEdit() {
        const newD = Number(newDebtInput.value);
        records[editIdx].debt = newD;
        records[editIdx].paid = records[editIdx].total - newD;
        localStorage.setItem("akura_records", JSON.stringify(records));
        closeEdit(); renderTable(); toast("Ledger Updated", "orange");
    }

    function deleteRec(i) { if(confirm("Confirm deletion?")) { records.splice(i, 1); localStorage.setItem("akura_records", JSON.stringify(records)); renderTable(); } }

    function filterTable() {
        let v = searchBox.value.toLowerCase();
        document.querySelectorAll("#tableBody tr").forEach(tr => tr.style.display = tr.innerText.toLowerCase().includes(v) ? "" : "none");
    }

    function danger() {
        let p = document.getElementById("sumPaid"), d = document.getElementById("sumDebt");
        let pV = Number(p.innerText.replace(/[^\d.]/g, '')), dV = Number(d.innerText.replace(/[^\d.]/g, ''));
        p.classList.remove("blink-green"); d.classList.remove("blink-red");
        if (pV > dV && dV !== 0) p.classList.add("blink-green");
        else if (pV < dV) d.classList.add("blink-red");
    }

    function renderChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        let tP = 0, tD = 0; records.forEach(r => { tP += r.paid; tD += r.debt; });
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Paid', 'Debt'], datasets: [{ data: [tP, tD], backgroundColor: ['#00c853', '#ff4d4d'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("AKURA GENERAL ENTERPRISE - LEDGER", 10, 10);
        doc.autoTable({
            head: [['SN', 'NAME', 'SERVICE', 'TOTAL', 'PAID', 'DEBT', 'DATE']],
            body: records.map((r, i) => [i + 1, r.name, r.product, r.total, r.paid, r.debt, r.date])
        });
        doc.save("Akura_Ledger.pdf");
    }
</script>
</body>
    </html>
