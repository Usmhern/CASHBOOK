<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKURA GENERAL ENTERPRISE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:black;
  color:#fff;
  overflow:hidden;
}

/* LOGIN */
#loginPage{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#243b55;
  padding:25px;
  border-radius:10px;
  width:280px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}

input{
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  border-bottom:1px solid #fff;
}

button{
  background:#00c6ff;
  border:none;
  cursor:pointer;
}

/* MENU */
.menu-btn{
  position:fixed;
  top:20px;
  left:20px;
  font-size:26px;
}

.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#000;
  padding-top:60px;
  transition:0.3s;
}

.sidebar a{
  display:block;
  padding:15px;
  color:#fff;
  text-decoration:none;
}

.sidebar a:hover{
  background:#00c6ff;
  color:#000;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  background:#000;
}

/* FORM */
.container{
  max-width:400px;
  margin:15px auto;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:10px;
}

/* TABLE */
.table-page,.chart-page{display:none;padding:10px}

.table-scroll{
  overflow-x:auto;
  overflow-y:auto;
  max-height:60vh;
}

table{
  width:100%;
  background:#fff;
  color:#000;
  border-collapse:collapse;
  min-width:700px;
}

th,td{
  padding:6px;
  border:1px solid #ccc;
}

/* TOAST */
#toast{
  position:fixed;
  top:70px;
  right:20px;
  padding:12px 16px;
  border-radius:6px;
  display:none;
  color:#fff;
  z-index:9999;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- SOUND -->
<audio id="soundSave" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="soundDelete" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="soundUpdate" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h3>Admin Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="sidebar" id="sidebar">
  <a onclick="showForm()">➕ Add Record</a>
  <a onclick="showTable()">📊 View Records</a>
  <a onclick="showChart()">📈 Chart</a>
  <a onclick="downloadPDF()">🧾 Download PDF</a>
  <a onclick="logout()">🚪 Logout</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<header>
  <h3>AKURA GENERAL ENTERPRISE</h3>
  <h4>CASHBOOK</h4>
</header>

<div class="container" id="formPage">
  <input id="customer" placeholder="Name">
  <input id="product" placeholder="Product">
  <input id="amount" type="number" placeholder="Amount ₦">
  <input id="paid" type="number" placeholder="Paid ₦">
  <button onclick="saveData()">Save</button>
</div>

<div class="table-page" id="tablePage">
<div class="table-scroll">
<table>
<thead style="background:navy;color:#fff">
<tr>
<th>SN</th><th>NAME</th><th>PRODUCT</th><th>AMOUNT</th><th>PAID</th><th>DEBT</th><th>DATE</th><th>ACTION</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<div class="chart-page" id="chartPage">
<canvas id="chart"></canvas>
</div>

</div>

<script>
const ADMIN_USER="Admin";
const ADMIN_PASS="1234";

const loginPage=document.getElementById("loginPage");
const app=document.getElementById("app");

const user=document.getElementById("user");
const pass=document.getElementById("pass");

const customer=document.getElementById("customer");
const product=document.getElementById("product");
const amount=document.getElementById("amount");
const paid=document.getElementById("paid");

const tbody=document.getElementById("tbody");

const toast=document.getElementById("toast");

const soundSave=document.getElementById("soundSave");
const soundDelete=document.getElementById("soundDelete");
const soundUpdate=document.getElementById("soundUpdate");

let records=JSON.parse(localStorage.getItem("records"))||[];

/* LOGIN */
if(localStorage.getItem("login")==="true") showApp();

function login(){
if(user.value===ADMIN_USER && pass.value===ADMIN_PASS){
localStorage.setItem("login","true");
showApp();
}else alert("Wrong login");
}

function logout(){
localStorage.removeItem("login");
location.reload();
}

function showApp(){
loginPage.style.display="none";
app.style.display="block";
}

/* TOAST + SOUND */
function showToast(msg,color,sound){
toast.innerText=msg;
toast.style.background=color;
toast.style.display="block";

if(sound) sound.play();

setTimeout(()=>toast.style.display="none",2000);
}

/* SAVE */
function saveData(){
let debt=amount.value-paid.value;
if(debt<0) debt=0;

records.push({
name:customer.value,
product:product.value,
amount:+amount.value,
paid:+paid.value,
debt:debt,
date:new Date().toLocaleDateString()
});

localStorage.setItem("records",JSON.stringify(records));
loadData();

showToast("✓ Saved Successfully","#00c853",soundSave);

customer.value=product.value=amount.value=paid.value="";
}

/* LOAD */
function loadData(){
tbody.innerHTML="";
records.forEach((r,i)=>{
tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${r.name}</td>
<td>${r.product}</td>
<td>₦${r.amount}</td>
<td>₦${r.paid}</td>
<td>₦${r.debt}</td>
<td>${r.date}</td>
<td>
<button onclick="del(${i})">❌</button>
</td>
</tr>`;
});
}

/* DELETE */
function del(i){
records.splice(i,1);
localStorage.setItem("records",JSON.stringify(records));
loadData();
showToast("✓ Deleted","red",soundDelete);
}
</script>

</body>
</html>
