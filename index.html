<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKURA GENERAL ENTERPRISE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* Progress Bar Container */
        .progress-container {
            width: 100%;
            background-color: #333;
            border-radius: 10px;
            height: 12px;
            position: relative;
            overflow: hidden;
        }
        select{
            outline:none;
            background:black;
            color:#eee;
            text-decoration:none;
            width:100%;
            border-top:none;
            border-left:none;
            border-right:none;
            border-bottom:1px solid grey;
        }
        /* The actual moving bar */
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            transition: width 0.5s ease-in-out;
        }

        /* Percentage text inside or next to bar */
        .progress-text {
            font-size: 10px;
            color: #000;
            font-weight: bold;
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 12px;
        }
        
        /* 1. Define the animation keyframes */
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; } 
            100% { opacity: 1; }
        }

        /* 2. Create the Green Blink class */
        .blink-green {
            color: #00ff00 !important; 
            animation: blink 1.2s linear infinite; 
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.6); 
            font-weight: bold;
        }

        /* 3. Create the Red Blink class */
        .blink-red {
            color: #ff0000 !important; 
            animation: blink 0.8s linear infinite; 
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
            font-weight: bold;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:black; color:#fff; min-height:100vh; overflow-x: hidden; }

        /* HEADER STYLES (RESTORED ORIGINAL LAYOUT) */
        header { 
            position: fixed; top: 0; width: 100%; background: #000; 
            padding: 15px; text-align: center; z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
        }
        .main-logo { width: 180px; height: auto; margin-bottom: 5px; } /* Original Big Logo */
        .sub-heading { color: #ffffff; font-size: 14px; font-weight: bold; letter-spacing: 3px; }

        /* LOGIN PAGE (RESTORED ORIGINAL LAYOUT) */
        #loginPage { display: flex; height: 100vh; justify-content: center; align-items: center; background: #141e30; }
        .login-box { background:#1c2e4a; padding:30px; border-radius:12px; width:320px; text-align: center; border: 1px solid #333; }
        .login-logo { width: 150px; height: auto; margin-bottom: 20px; } /* Original Big Logo, No Border */
        
        /* APP STRUCTURE */
        #app { display: none; }
        .page { display: none; padding: 20px; padding-top: 250px; max-width: 900px; margin: auto; }
        .active-page { display: block; }

        /* SIDEBAR */
        .menu-btn { position: fixed; top: 80px; left: 15px; z-index: 1100; font-size: 24px; cursor: pointer; background: #00c6ff; padding: 5px 12px; border-radius: 4px; color: #000; }
        .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: #0a0f18; transition: 0.3s; z-index: 1500; padding-top: 80px; }
        .sidebar a { display: block; padding: 15px 25px; color: #fff; text-decoration: none; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar a:hover { background: #00c6ff; color: #000; }
        .overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1400; }

        /* UI ELEMENTS */
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; outline: none; }
        input { background: transparent; color: #fff; border-bottom: 1px solid #333; border-top:none; border-left:none; border-right:none;}
        button { background: #00c6ff; font-weight: bold; cursor: pointer; color: #000; }
        
        /* TABLE & DASHBOARD */
        .dashboard { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { flex: 1; background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; }
        .table-wrap { overflow-x: auto; background: #fff; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; color: #000; min-width: 600px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 13px; }
        th { background: #243b55; color: #fff; }

        /* TOAST */
        #toast { position: fixed; top: 70px; right: 20px; padding: 15px 25px; border-radius: 5px; display: none; z-index: 3000; font-weight: bold; color: #fff; }

        /* MODALS */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c2e4a; padding: 25px; border-radius: 12px; z-index: 2000; display: none; width: 90%; max-width: 320px; text-align: center; border: 2px solid #00c6ff; }
        .modal-icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="loginPage">
    <div class="login-box">
        <img src="akura.png" class="login-logo">
        <h2 style="margin-bottom:20px;">Admin Login</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div id="app">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <header>
        <img src="akura.png" class="main-logo">
        <h3 style="color:#00c6ff">AKURA GENERAL ENTERPRISE</h3>
        <p class="sub-heading">CASHBOOK</p>
    </header>

    <div class="sidebar" id="sidebar">
        <a onclick="showPage('formPage')">➕ Add New Record</a>
        <a onclick="showPage('tablePage')">📊 View Records</a>
        <a onclick="showPage('chartPage')">📈 Statistics Chart</a>
        <a onclick="showPage('savingsPage')">💰 Savings/Deposits</a>
        <a onclick="showPage('stockPage')">📦 Inventory/Stock</a>
        <a onclick="downloadPDF()">🧾 Download PDF</a>
        <a onclick="logout()" style="color: #ff4d4d; margin-top: 20px;">🚪 Logout</a>
    </div>

    <div id="formPage" class="page">
        <div style="background:rgba(255,255,255,0.05); padding: 25px; border-radius: 10px;">
            <h3>REGISTER SALE </h3>
            <input id="custName" placeholder="Customer Name">
            <input id="prodName" placeholder="Product">
            <input id="totalAmt" type="number" placeholder="Total Amount (₦)">
            <input id="paidAmt" type="number" placeholder="Amount Paid (₦)">
            <button onclick="saveRecord()">SAVE RECORD</button>
        </div>
    </div>

    <div id="tablePage" class="page">
        <div class="dashboard">
            <div class="card">TOTAL PAID<br><b id="sumPaid" style="color:green">₦0</b></div>
            <div class="card">TOTAL DEBT<br><b id="sumDebt" style="color:red">₦0</b></div>
        </div>
          <input id="searchBox" placeholder="Search by name or product..." onkeyup="filterTable()">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>SN</th>
                        <th>NAME</th>
                        <th>SERVICE</th>
                        <th>AMOUNT</th>
                        <th>PAID</th>
                        <th>DEBT</th>
                        <th>PROGRESS</th> <th>DATE</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="alertModal" class="modal">
        <div id="modalIcon" class="modal-icon"></div>
        <h3 id="modalTitle"></h3>
        <p id="modalMsg" style="color:#ccc; font-size:14px; margin-bottom:15px;"></p>
        <div id="modalActionArea"></div>
    </div>

</div>

<script>
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "12345";
    let records = JSON.parse(localStorage.getItem("akura_records")) || [];

    // All functions (saveRecord, renderTable, checkLogin, showPage, etc.) 
    // are preserved from your original source code.

    window.onload = () => {
        if(localStorage.getItem("isLoggedIn") === "true") {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("app").style.display = "block";
            showPage('tablePage');
        }
    };

    function checkLogin() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;
        if (u === ADMIN_USER && p === ADMIN_PASS) {
            localStorage.setItem("isLoggedIn", "true");
            location.reload();
        } else {
            alert("Invalid Credentials");
        }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        toggleMenu(false);
        if(id === 'tablePage') renderTable();
    }

    function toggleMenu(open) {
        document.getElementById("sidebar").style.left = open ? "0" : "-260px";
        document.getElementById("overlay").style.display = open ? "block" : "none";
    }

    function saveRecord() {
        const total = Number(totalAmt.value), paid = Number(paidAmt.value);
        if(!custName.value || total <= 0) return alert("Fill fields correctly");
        records.push({ name: custName.value, product: prodName.value, total: total, paid: paid, debt: total - paid, date: new Date().toLocaleDateString() });
        localStorage.setItem("akura_records", JSON.stringify(records));
        custName.value = prodName.value = totalAmt.value = paidAmt.value = "";
        showPage('tablePage');
    }

    function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        let sPaid = 0, sDebt = 0;
        records.forEach((r, i) => {
            sPaid += r.paid; sDebt += r.debt;
            let percentage = r.total > 0 ? Math.round((r.paid / r.total) * 100) : 0;
            tbody.innerHTML += `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.product}</td><td>₦${r.total.toLocaleString()}</td><td>₦${r.paid.toLocaleString()}</td><td style="color:${r.debt > 0 ? 'red' : 'green'}">₦${r.debt.toLocaleString()}</td><td><div class="progress-container"><div class="progress-bar" style="width:${percentage}%;"><span class="progress-text">${percentage}%</span></div></div></td><td>${r.date}</td><td><button style="width:auto" onclick="confirmDelete(${i})">❌</button></td></tr>`;
        });
        document.getElementById("sumPaid").innerText = "₦" + sPaid.toLocaleString();
        document.getElementById("sumDebt").innerText = "₦" + sDebt.toLocaleString();
    }

    function logout() { localStorage.removeItem("isLoggedIn"); location.reload(); }
    function closeAllModals() { document.getElementById("alertModal").style.display = "none"; document.getElementById("overlay").style.display = "none"; toggleMenu(false); }
</script>
</body>
</html>
