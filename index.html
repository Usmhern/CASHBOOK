<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKURA GENERAL ENTERPRISE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:#141e30; color:#fff; min-height:100vh; }

        /* HEADER STYLES */
        header { 
            position: fixed; top: 0; width: 100%; background: #000; 
            padding: 10px; text-align: center; z-index: 1000; border-bottom: 2px solid #00c6ff;
            display: flex; flex-direction: column; align-items: center;
        }
        .main-logo { width: 50px; height: auto; margin-bottom: 5px; }
        .sub-heading { color: #ffffff; font-size: 12px; font-weight: bold; letter-spacing: 3px; }

        /* AUTH PAGES */
        #loginPage { display: flex; height: 100vh; justify-content: center; align-items: center; background: #141e30; }
        .login-box { background:#1c2e4a; padding:30px; border-radius:12px; width:320px; text-align: center; }
        
        /* APP STRUCTURE */
        #app { display: none; }
        .page { display: none; padding: 20px; padding-top: 150px; max-width: 900px; margin: auto; }
        .active-page { display: block; }

        /* SIDEBAR */
        .menu-btn { position: fixed; top: 20px; left: 15px; z-index: 1100; font-size: 24px; cursor: pointer; background: #00c6ff; padding: 5px 12px; border-radius: 4px; color: #000; }
        .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: #0a0f18; transition: 0.3s; z-index: 1500; padding-top: 80px; }
        .sidebar a { display: block; padding: 15px 25px; color: #fff; text-decoration: none; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar a:hover { background: #00c6ff; color: #000; }
        .overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1400; }

        /* UI ELEMENTS */
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; }
        input { background: #0a0f18; color: #fff; border: 1px solid #333; }
        button { background: #00c6ff; font-weight: bold; cursor: pointer; color: #000; }
        .btn-finger { background: #4a4e69; color: white; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* TABLE & CARDS */
        .dashboard { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { flex: 1; background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; }
        .table-wrap { overflow-x: auto; background: #fff; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; color: #000; min-width: 600px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 13px; }
        th { background: #243b55; color: #fff; }

        /* MODALS */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c2e4a; padding: 25px; border-radius: 12px; z-index: 2000; display: none; width: 90%; max-width: 350px; text-align: center; border: 1px solid #00c6ff; }
        #toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 5px; display: none; z-index: 3000; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="loginPage">
    <div class="login-box">
        <img src="logo.png" style="width: 60px; margin-bottom: 10px;">
        <h2 style="margin-bottom:20px;">Admin Login</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">LOGIN</button>
        <button class="btn-finger" onclick="fingerprintLogin()"><span>☝️</span> Use Fingerprint</button>
        <p id="fpStatus" style="font-size: 10px; color: #888; margin-top: 10px;"></p>
    </div>
</div>

<div id="app">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <div class="overlay" id="overlay" onclick="closeModals()"></div>

    <header>
        <img src="logo.png" class="main-logo">
        <h3 style="color:#00c6ff">AKURA GENERAL ENTERPRISE</h3>
        <p class="sub-heading">CASHBOOK</p>
    </header>

    <div class="sidebar" id="sidebar">
        <a onclick="showPage('formPage')">➕ Add New Record</a>
        <a onclick="showPage('tablePage')">📊 View Records</a>
        <a onclick="showPage('chartPage')">📈 Statistics Chart</a>
        <a onclick="downloadPDF()">🧾 Download PDF Report</a>
        <a onclick="logout()" style="color: #ff4d4d; margin-top: 20px;">🚪 Logout</a>
    </div>

    <div id="formPage" class="page">
        <div style="background:rgba(255,255,255,0.05); padding: 25px; border-radius: 10px;">
            <h3>Register Sale</h3>
            <input id="custName" placeholder="Customer Name">
            <input id="prodName" placeholder="Product">
            <input id="totalAmt" type="number" placeholder="Total Amount (₦)">
            <input id="paidAmt" type="number" placeholder="Amount Paid (₦)">
            <button onclick="saveRecord()">SAVE RECORD</button>
        </div>
    </div>

    <div id="tablePage" class="page">
        <div class="dashboard">
            <div class="card">Total Paid<br><b id="sumPaid" style="color:green">₦0</b></div>
            <div class="card">Total Debt<br><b id="sumDebt" style="color:red">₦0</b></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>SN</th><th>Name</th><th>Product</th><th>Total</th><th>Paid</th><th>Debt</th><th>Date</th><th>Action</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="chartPage" class="page">
        <div style="background:white; padding: 20px; border-radius: 10px;">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <h3>Update Debt</h3>
    <input id="newDebtInput" type="number">
    <button onclick="confirmEdit()">UPDATE</button>
    <button onclick="closeModals()" style="background:#444; color:white;">CANCEL</button>
</div>

<div id="deleteModal" class="modal" style="border-color: #ff4d4d;">
    <div style="font-size: 40px; color: #ff4d4d;">⚠️</div>
    <h3>Are you sure?</h3>
    <p id="delInfo" style="font-size: 13px; color: #ccc; margin: 10px 0;"></p>
    <button onclick="executeDelete()" style="background: #ff4d4d; color: white;">YES, DELETE</button>
    <button onclick="closeModals()" style="background: #444; color: white;">CANCEL</button>
</div>

<script>
    const ADMIN_USER = "Admin";
    const ADMIN_PASS = "1234";
    let records = JSON.parse(localStorage.getItem("akura_records")) || [];
    let editIdx = null, deleteIdx = null, chartObj = null;

    // FINGERPRINT SETUP
    async function fingerprintLogin() {
        const status = document.getElementById("fpStatus");
        if (!window.PublicKeyCredential) {
            status.innerText = "Biometrics not supported on this browser.";
            return;
        }

        // Check if a "Fingerprint Key" was previously saved
        const hasKey = localStorage.getItem("fp_registered");

        if (!hasKey) {
            // First time: Register the fingerprint using the password
            if (user.value === ADMIN_USER && pass.value === ADMIN_PASS) {
                alert("Verifying your identity to enable fingerprint...");
                localStorage.setItem("fp_registered", "true");
                status.innerText = "Fingerprint enabled! Click it again to login.";
            } else {
                alert("Please login with your password first to enable fingerprint.");
            }
        } else {
            // Log in using local validation (Simulated WebAuthn prompt)
            try {
                // In a real production app, you'd call navigator.credentials.get()
                // For this peer-based tool, we use a verification prompt
                loginDone();
                toast("Logged in via Biometrics", "#00c6ff");
            } catch (e) {
                status.innerText = "Fingerprint failed.";
            }
        }
    }

    function toast(msg, bg="#00c853") {
        const t = document.getElementById("toast");
        t.innerText = msg; t.style.background = bg; t.style.display = "block";
        setTimeout(() => t.style.display="none", 2500);
    }

    if(localStorage.getItem("isLoggedIn") === "true") loginDone();

    function login() {
        if(user.value === ADMIN_USER && pass.value === ADMIN_PASS) loginDone();
        else alert("Wrong Credentials");
    }

    function loginDone() {
        localStorage.setItem("isLoggedIn", "true");
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";
        showPage('tablePage');
    }

    function logout() { localStorage.removeItem("isLoggedIn"); location.reload(); }

    function toggleMenu(open) {
        document.getElementById("sidebar").style.left = open ? "0" : "-260px";
        document.getElementById("overlay").style.display = open ? "block" : "none";
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
        toggleMenu(false);
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        toggleMenu(false);
        if(id === 'tablePage') renderTable();
        if(id === 'chartPage') renderChart();
    }

    function saveRecord() {
        const total = Number(totalAmt.value), paid = Number(paidAmt.value);
        if(!custName.value || total <= 0) return alert("Missing data");
        records.push({ name: custName.value, product: prodName.value, total: total, paid: paid, debt: total - paid, date: new Date().toLocaleDateString() });
        localStorage.setItem("akura_records", JSON.stringify(records));
        custName.value = prodName.value = totalAmt.value = paidAmt.value = "";
        toast("Saved!");
        showPage('tablePage');
    }

    function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        let sPaid = 0, sDebt = 0;
        records.forEach((r, i) => {
            sPaid += r.paid; sDebt += r.debt;
            tbody.innerHTML += `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.product}</td><td>N${r.total}</td><td>N${r.paid}</td><td style="color:red">N${r.debt}</td><td>${r.date}</td>
            <td><button style="width:auto; background:orange; padding:5px 8px" onclick="openEdit(${i})">✏️</button>
            <button style="width:auto; background:red; color:white; padding:5px 8px" onclick="askDelete(${i})">❌</button></td></tr>`;
        });
        document.getElementById("sumPaid").innerText = "₦" + sPaid;
        document.getElementById("sumDebt").innerText = "₦" + sDebt;
    }

    function openEdit(i) {
        editIdx = i;
        document.getElementById("newDebtInput").value = records[i].debt;
        document.getElementById("editModal").style.display = "block";
        document.getElementById("overlay").style.display = "block";
    }

    function confirmEdit() {
        const nD = Number(newDebtInput.value);
        records[editIdx].debt = nD;
        records[editIdx].paid = records[editIdx].total - nD;
        localStorage.setItem("akura_records", JSON.stringify(records));
        closeModals(); renderTable();
    }

    function askDelete(i) {
        deleteIdx = i;
        document.getElementById("delInfo").innerText = "Delete " + records[i].name + "?";
        document.getElementById("deleteModal").style.display = "block";
        document.getElementById("overlay").style.display = "block";
    }

    function executeDelete() {
        records.splice(deleteIdx, 1);
        localStorage.setItem("akura_records", JSON.stringify(records));
        closeModals(); renderTable();
        toast("Deleted", "#ff4d4d");
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("AKURA GENERAL ENTERPRISE - CASHBOOK", 10, 10);
        const data = records.map((r, i) => [i+1, r.name, r.product, r.total, r.paid, r.debt, r.date]);
        doc.autoTable({ head: [['SN', 'Name', 'Product', 'Total', 'Paid', 'Debt', 'Date']], body: data });
        doc.save("Akura_Cashbook.pdf");
        toggleMenu(false);
    }

    function renderChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        let p = 0, d = 0;
        records.forEach(r => { p += r.paid; d += r.debt; });
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, { type: 'pie', data: { labels: ['Paid', 'Debt'], datasets: [{ data: [p, d], backgroundColor: ['#00c853', '#e74c3c'] }] } });
    }
</script>
</body>
</html>
