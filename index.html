<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKURA GENERAL ENTERPRISE</title>
    <link rel="icon" type="image/png" href="akura.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:black; color:#fff; min-height:100vh; overflow-x: hidden; }

        /* Auth Page */
        #loginPage { 
            display: flex; height: 100vh; justify-content: center; align-items: center; 
            background: linear-gradient(to right, #141e30, #243b55);
        }
        .login-box { background:#1c2e4a; padding:30px; border-radius:12px; width:320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center;}
        
        /* Layout */
        #app { display: none; }
        .page { display: none; padding: 20px; padding-top: 220px; max-width: 900px; margin: auto; }
        .active-page { display: block; }
        
        header { 
            position: fixed; top: 0; width: 100%; background: #000; padding: 10px; 
            text-align: center; z-index: 1000; border-bottom: 2px solid #00c6ff;
            display: flex; flex-direction: column; align-items: center;
        }
        .main-logo { width: 140px; height: auto; margin-bottom: 5px; }

        /* Sidebar */
        .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 1100; font-size: 25px; cursor: pointer; color: #00c6ff; }
        .sidebar { 
            position: fixed; top: 0; left: -260px; width: 260px; height: 100%; 
            background: #0a0f18; transition: 0.3s; z-index: 1500; padding-top: 60px; border-right: 1px solid #333;
        }
        .sidebar a { display: block; padding: 15px 25px; color: #fff; text-decoration: none; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .sidebar a:hover { background: #00c6ff; color: #000; }
        .sidebar a i { margin-right: 10px; color: #00c6ff; }
        .overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1400; }

        /* UI Components */
        .container { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; border: none; border-bottom: 1px solid #333; 
            background: transparent; color: #fff; outline: none; 
        }
        option { background: #1c2e4a; color: white; }
        button { width: 100%; padding: 12px; background: #00c6ff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #0088cc; }

        /* Dashboard Cards */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; }
        .card b { font-size: 1.2rem; }

        /* Table Style */
        .table-wrap { overflow-x: auto; background: #fff; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; color: #000; min-width: 600px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 13px; }
        th { background: #243b55; color: #fff; }

        /* Animations */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .blink-green { color: #00aa00 !important; animation: blink 1s infinite; font-weight: bold; }
        .blink-red { color: #cc0000 !important; animation: blink 1s infinite; font-weight: bold; }

        #toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 5px; display: none; z-index: 3000; font-weight: bold; }
        
        .btn-msg { text-decoration: none; font-size: 10px; padding: 5px; border-radius: 3px; background: #eee; color: #333; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="loginPage">
    <div class="login-box">
        <h2 style="margin-bottom:15px;">Akura Admin</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">ENTER SYSTEM</button>
    </div>
</div>

<div id="app">
    <header>
        <img src="akura.png" alt="AKURA" class="main-logo">
        <h3 style="color:#00c6ff;">AKURA GENERAL ENTERPRISE</h3>
        <p style="font-size:12px; letter-spacing:2px;">BUSINESS CASHBOOK</p>
    </header>

    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>

    <div class="sidebar" id="sidebar">
        <a onclick="showPage('formPage')"><i class="fas fa-plus"></i> Add New Sale</a>
        <a onclick="showPage('expensePage')"><i class="fas fa-minus-circle"></i> Record Expense</a>
        <a onclick="showPage('tablePage')"><i class="fas fa-table"></i> View Records</a>
        <a onclick="showPage('chartPage')"><i class="fas fa-chart-line"></i> Statistics</a>
        <a onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Download PDF</a>
        <a onclick="exportData()"><i class="fas fa-file-export"></i> Backup Data</a>
        <a onclick="logout()" style="color:#ff4d4d;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div id="formPage" class="page">
        <div class="container">
            <h3><i class="fas fa-cart-plus"></i> REGISTER NEW SALE</h3>
            <input id="custName" placeholder="Customer Name">
            <input id="custPhone" placeholder="Phone Number (e.g. 23480...)">
            <select id="msgPref">
                <option value="whatsapp">Prefer WhatsApp Notification</option>
                <option value="sms">Prefer SMS Notification</option>
            </select>
            <input id="prodName" placeholder="Service / Product">
            <input id="totalAmt" type="number" placeholder="Total Amount (₦)">
            <input id="paidAmt" type="number" placeholder="Amount Paid (₦)">
            <button onclick="saveRecord()">SAVE RECORD</button>
        </div>
    </div>

    <div id="expensePage" class="page">
        <div class="container">
            <h3><i class="fas fa-wallet"></i> RECORD EXPENSE</h3>
            <input id="expDesc" placeholder="Description (e.g. Electricity, Fuel)">
            <input id="expAmt" type="number" placeholder="Amount (₦)">
            <button onclick="saveExpense()" style="background:orange; color:#000;">SAVE EXPENSE</button>
        </div>
    </div>

    <div id="tablePage" class="page">
        <div class="dashboard">
            <div class="card">PAID<br><b id="sumPaid">₦0</b></div>
            <div class="card">DEBT<br><b id="sumDebt">₦0</b></div>
        </div>
        <input id="searchBox" placeholder="Search customer or service..." onkeyup="filterTable()">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>NAME</th><th>SERVICE</th><th>PAID</th><th>DEBT</th><th>NOTIFY</th><th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="chartPage" class="page">
        <div class="container" style="background:black; border: 1px solid #333;">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<script>
    const AUTH_USER = "Admin";
    const AUTH_PASS = "1234";
    let records = JSON.parse(localStorage.getItem("akura_records")) || [];
    let expenses = JSON.parse(localStorage.getItem("akura_expenses")) || [];
    let chartObj = null;

    // Auth
    function login() {
        if(user.value === AUTH_USER && pass.value === AUTH_PASS) {
            localStorage.setItem("isLoggedIn", "true");
            loginDone();
        } else { toast("Invalid Credentials", "red"); }
    }
    function loginDone() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";
        showPage('tablePage');
    }
    if(localStorage.getItem("isLoggedIn") === "true") loginDone();
    function logout() { localStorage.removeItem("isLoggedIn"); location.reload(); }

    // Navigation
    function toggleMenu(open) {
        document.getElementById("sidebar").style.left = open ? "0" : "-260px";
        document.getElementById("overlay").style.display = open ? "block" : "none";
    }
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        toggleMenu(false);
        if(id === 'tablePage') renderTable();
        if(id === 'chartPage') renderChart();
    }

    // Logic: Save Sale
    function saveRecord() {
        const t = Number(totalAmt.value), p = Number(paidAmt.value);
        if(!custName.value || t <= 0) return toast("Enter valid details", "red");
        records.push({
            name: custName.value, phone: custPhone.value, pref: msgPref.value,
            product: prodName.value, total: t, paid: p, debt: t - p,
            date: new Date().toLocaleDateString()
        });
        localStorage.setItem("akura_records", JSON.stringify(records));
        toast("Sale Saved!");
        ["custName","custPhone","prodName","totalAmt","paidAmt"].forEach(id => document.getElementById(id).value = "");
        showPage('tablePage');
    }

    // Logic: Save Expense
    function saveExpense() {
        const a = Number(expAmt.value);
        if(!expDesc.value || a <= 0) return toast("Invalid Expense", "red");
        expenses.push({ desc: expDesc.value, amount: a, date: new Date().toLocaleDateString() });
        localStorage.setItem("akura_expenses", JSON.stringify(expenses));
        toast("Expense Saved!", "orange");
        expDesc.value = ""; expAmt.value = "";
    }

    // Logic: Render Table
    function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        let sP = 0, sD = 0;
        records.forEach((r, i) => {
            sP += r.paid; sD += r.debt;
            let msg = `Hello ${r.name}, this is a reminder from Akura General Enterprise for your balance of N${r.debt}.`;
            let link = r.pref === 'whatsapp' ? `https://wa.me/${r.phone}?text=${encodeURIComponent(msg)}` : `sms:${r.phone}?body=${encodeURIComponent(msg)}`;
            
            tbody.innerHTML += `<tr>
                <td>${r.name}</td><td>${r.product}</td><td>₦${r.paid}</td>
                <td style="color:${r.debt > 0 ? 'red' : 'green'}">₦${r.debt}</td>
                <td><a href="${link}" class="btn-msg">${r.pref.toUpperCase()}</a></td>
                <td><button style="width:auto; padding:2px 5px;" onclick="deleteRec(${i})">❌</button></td>
            </tr>`;
        });
        document.getElementById("sumPaid").innerText = "₦" + sP;
        document.getElementById("sumDebt").innerText = "₦" + sD;
        danger();
    }

    function deleteRec(i) { if(confirm("Delete record?")) { records.splice(i, 1); localStorage.setItem("akura_records", JSON.stringify(records)); renderTable(); } }

    function filterTable() {
        let val = searchBox.value.toLowerCase();
        document.querySelectorAll("#tableBody tr").forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }

    // Logic: Blinking Background
    function danger() {
        let p = document.getElementById("sumPaid"), d = document.getElementById("sumDebt");
        let pVal = Number(p.innerText.replace(/[^\d.]/g, '')), dVal = Number(d.innerText.replace(/[^\d.]/g, ''));
        p.classList.remove("blink-green"); d.classList.remove("blink-red");
        if (pVal > dVal && dVal !== 0) p.classList.add("blink-green");
        else if (pVal < dVal) d.classList.add("blink-red");
    }

    // Logic: Chart
    function renderChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const daily = {};
        records.forEach(r => { daily[r.date] = (daily[r.date] || 0) + r.paid; });
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Object.keys(daily),
                datasets: [{ label: 'Income Trend', data: Object.values(daily), borderColor: '#00c6ff', tension: 0.3, fill: true, backgroundColor: 'rgba(0,198,255,0.1)' }]
            },
            options: { plugins: { legend: { labels: { color: '#fff' } } }, scales: { x: { ticks: { color: '#fff' } }, y: { ticks: { color: '#fff' } } } }
        });
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({records, expenses})], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = "Akura_Backup.json"; a.click();
    }

    function toast(m, b="#00c853") {
        const t = document.getElementById("toast"); t.innerText = m; t.style.background = b; t.style.display = "block";
        setTimeout(() => t.style.display="none", 2500);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("AKURA GENERAL ENTERPRISE - REPORT", 10, 10);
        const data = records.map(r => [r.name, r.product, r.paid, r.debt, r.date]);
        doc.autoTable({ head: [['Name', 'Service', 'Paid', 'Debt', 'Date']], body: data });
        doc.save("Report.pdf");
    }
</script>
</body>
    </html>
