<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AKURA GENERAL ENTERPRISES</title>
<link rel="icon" href="logo.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#141e30;color:#fff}

/* LOGIN */
#loginPage{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.box{
  background:#243b55;
  padding:25px;
  border-radius:10px;
  width:280px;
}

/* INPUT */
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

button{background:#00c6ff;font-weight:bold;cursor:pointer}

/* POPUP */
#popup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#00c851;
  padding:10px 18px;
  border-radius:8px;
  display:none;
  z-index:9999;
}

/* MENU */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:24px;
  cursor:pointer;
  z-index:2000;
}

.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#000;
  padding-top:60px;
  transition:0.3s;
  z-index:1500;
}

.sidebar a{
  display:block;
  padding:15px;
  color:#fff;
  text-decoration:none;
}

.sidebar a:hover{background:#00c6ff;color:#000}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  z-index:1400;
}

/* HEADER */
header{text-align:center;padding:10px}
.logo{width:60px;border-radius:50%}

/* FORM */
.container{
  max-width:400px;
  margin:15px auto;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:10px;
}

/* TABLE */
.table-page{display:none;padding:10px}

.dashboard{
  display:flex;
  gap:8px;
}

.card{
  flex:1;
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:6px;
  text-align:center;
}

/* TABLE */
table{
  width:100%;
  background:#fff;
  color:#000;
  margin-top:10px;
  border-collapse:collapse;
  min-width:700px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:12px;
}

td[contenteditable]{background:#f9f9f9}
</style>
</head>

<body>

<!-- POPUP -->
<div id="popup">✔ Saved Successfully</div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="box">
    <h3>Admin Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="sidebar" id="sidebar">
  <a onclick="showForm()">➕ Add</a>
  <a onclick="showTable()">📊 Table</a>
  <a onclick="downloadPDF()">🧾 PDF</a>
  <a onclick="logout()">🚪 Logout</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<header>
  <img src="logo.png" class="logo">
  <h3>AKURA GENERAL ENTERPRISES</h3>
</header>

<!-- FORM -->
<div class="container" id="formPage">
  <input id="name" placeholder="Name">
  <input id="product" placeholder="Product">
  <input id="amount" type="number" placeholder="Amount ₦">
  <input id="paid" type="number" placeholder="Paid ₦">
  <button onclick="saveData()">Save</button>
</div>

<!-- TABLE -->
<div class="table-page" id="tablePage">

<div class="dashboard">
  <div class="card">Paid<br><b id="paidT">₦0</b></div>
  <div class="card">Debt<br><b id="debtT">₦0</b></div>
</div>

<div style="max-width:220px;margin:10px auto">
<canvas id="chart"></canvas>
</div>

<table>
<thead>
<tr>
<th>SN</th><th>Name</th><th>Product</th><th>Amount</th><th>Paid</th><th>Remaining</th><th>Total</th><th>Date</th><th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>
</div>

<script>
let records = JSON.parse(localStorage.getItem("records")) || [];
let chart;

/* LOGIN */
const ADMIN="admin";
const PASS="1234";

if(localStorage.getItem("login")==="true") showApp();

function login(){
  if(user.value===ADMIN && pass.value===PASS){
    localStorage.setItem("login","true");
    showApp();
  }else alert("Wrong login");
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function showApp(){
  loginPage.style.display="none";
  app.style.display="block";
}

/* MENU */
function openMenu(){sidebar.style.left="0";overlay.style.display="block";}
function closeMenu(){sidebar.style.left="-260px";overlay.style.display="none";}

/* NAV */
function showForm(){formPage.style.display="block";tablePage.style.display="none";closeMenu();}
function showTable(){formPage.style.display="none";tablePage.style.display="block";load();closeMenu();}

/* SAVE */
function saveData(){

  let n=name.value.trim();
  let p=product.value.trim();
  let a=Number(amount.value);
  let pa=Number(paid.value);

  if(!n||!p||!a||!pa){
    alert("Fill all fields");
    return;
  }

  let data={
    name:n,
    product:p,
    amount:a,
    paid:pa,
    remaining:a-pa>0?a-pa:0,
    total:pa,
    date:new Date().toLocaleDateString()
  };

  records.push(data);
  update();

  name.value="";
  product.value="";
  amount.value="";
  paid.value="";

  popup();
}

/* POPUP */
function popup(){
  popupEl.style.display="block";
  setTimeout(()=>popupEl.style.display="none",1500);
}

/* UPDATE */
function update(){
  localStorage.setItem("records",JSON.stringify(records));
  load();
}

/* LOAD */
function load(){
  tbody.innerHTML="";
  let paid=0,debt=0;

  records.forEach((r,i)=>{
    paid+=r.paid;
    debt+=r.remaining;

    tbody.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${r.name}</td>
      <td>${r.product}</td>
      <td>₦${r.amount}</td>
      <td>₦${r.paid}</td>
      <td>₦${r.remaining}</td>
      <td>₦${r.total}</td>
      <td>${r.date}</td>
      <td><button onclick="del(${i})">Del</button></td>
    </tr>`;
  });

  paidT.innerText="₦"+paid;
  debtT.innerText="₦"+debt;

  draw(paid,debt);
}

/* DELETE */
function del(i){
  records.splice(i,1);
  update();
}

/* CHART */
function draw(p,d){
  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"doughnut",
    data:{labels:["Income","Debt"],datasets:[{data:[p,d],backgroundColor:["green","red"]}]}
  });
}

/* PDF */
function downloadPDF(){
  let w=window.open("");
  w.document.write("<h2>AKURA GENERAL ENTERPRISES</h2>");
  w.print();
}

/* INIT */
const popupEl=document.getElementById("popup");
update();
</script>

</body>
</html>
