<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKURA GENERAL ENTERPRISES</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  width:300px;
  padding:20px;
  background:#1e293b;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}

/* APP */
#app{display:none}

/* FORM */
.form{
  max-width:400px;
  margin:20px auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

/* POPUP */
#popup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:green;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}

/* TABLE */
table{
  width:100%;
  background:white;
  color:black;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="popup">Saved Successfully ✔</div>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>Admin Login</h3>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="form">
  <input id="name" placeholder="Name">
  <input id="product" placeholder="Product">
  <input id="amount" type="number" placeholder="Amount ₦">
  <input id="paid" type="number" placeholder="Paid ₦">
  <button onclick="saveData()">Save</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Product</th>
<th>Amount</th>
<th>Paid</th>
<th>Remaining</th>
<th>Date</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>

/* SAFE DOM REFERENCES (IMPORTANT FIX) */
const nameInput = document.getElementById("name");
const productInput = document.getElementById("product");
const amountInput = document.getElementById("amount");
const paidInput = document.getElementById("paid");

const table = document.getElementById("table");

let data = JSON.parse(localStorage.getItem("data")) || [];

/* LOGIN */
function login(){
  if(u.value==="admin" && p.value==="1234"){
    login.style.display="none";
    app.style.display="block";
    load();
  }else{
    alert("Wrong login");
  }
}

/* SAVE - FIXED (THIS IS YOUR ORIGINAL FLOW RESTORED) */
function saveData(){

  let n = nameInput.value.trim();
  let pr = productInput.value.trim();
  let a = Number(amountInput.value);
  let pa = Number(paidInput.value);

  if(!n || !pr || !a || !pa){
    alert("Fill all fields");
    return;
  }

  let remaining = a - pa;

  let obj = {
    name:n,
    product:pr,
    amount:a,
    paid:pa,
    remaining: remaining > 0 ? remaining : 0,
    date: new Date().toLocaleDateString()
  };

  data.push(obj);

  localStorage.setItem("data", JSON.stringify(data));

  showPopup();

  nameInput.value="";
  productInput.value="";
  amountInput.value="";
  paidInput.value="";

  load();
}

/* POPUP */
function showPopup(){
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",1500);
}

/* LOAD TABLE */
function load(){
  table.innerHTML="";

  data.forEach((d)=>{
    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.product}</td>
        <td>₦${d.amount}</td>
        <td>₦${d.paid}</td>
        <td>₦${d.remaining}</td>
        <td>${d.date}</td>
      </tr>
    `;
  });
}

/* INIT */
if(localStorage.getItem("data")){
  load();
}

</script>

</body>
</html>
