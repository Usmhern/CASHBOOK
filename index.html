<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKURA GENERAL ENTERPRISE</title>
<link rel="icon" href="akura.jpg">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* BODY FIX */
body{
  background:black;
  color:#fff;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* LOGIN */
#loginPage{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#243b55;
  padding:25px;
  border-radius:10px;
  width:90%;
  max-width:280px;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}

input{
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  border-bottom:1px solid #fff;
}

button{
  background:#00c6ff;
  border:none;
  cursor:pointer;
}

/* MENU */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:26px;
  z-index:2000;
}

.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#000;
  padding-top:60px;
  transition:0.3s;
  z-index:1500;
}

.sidebar a{
  display:block;
  padding:15px;
  color:#fff;
  text-decoration:none;
}

.sidebar a:hover{background:#00c6ff;color:#000}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  z-index:1400;
}

/* HEADER */
header{
  text-align:center;
  padding:10px;
  background:#000;
  flex-shrink:0;
}

.logo{width:90px}

/* FORM */
.container{
  width:95%;
  max-width:400px;
  margin:10px auto;
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:10px;
}

/* TABLE PAGE */
.table-page{
  display:none;
  flex:1;
  padding:10px;
  overflow:hidden;
}

/* DASHBOARD */
.dashboard{display:flex;gap:5px}

.card{
  flex:1;
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:6px;
  text-align:center;
}

/* TOP BAR */
.top-bar{
  display:flex;
  gap:5px;
  margin-top:10px;
}

.top-bar input{flex:1}

.top-bar button{
  width:auto;
  padding:5px 8px;
  font-size:10px;
}

/* TABLE SCROLL */
.table-scroll{
  margin-top:10px;
  height:calc(100vh - 260px);
  overflow:auto;
}

/* TABLE */
table{
  width:100%;
  min-width:700px;
  background:#fff;
  color:#000;
  border-collapse:collapse;
}

th,td{
  padding:6px;
  border:1px solid #ccc;
  font-size:12px;
  text-align:center;
}

td button{
  width:auto;
  padding:2px 6px;
  background:transparent;
  border:none;
  cursor:pointer;
}

/* CHART */
.chart-page{
  display:none;
  padding:10px;
  flex:1;
}

canvas{
  background:#fff;
  margin-top:20px;
  border-radius:10px;
  width:100%!important;
}

/* TOAST */
#toast{
  position:fixed;
  top:70px;
  right:20px;
  background:#00c853;
  color:#fff;
  padding:12px 16px;
  border-radius:6px;
  font-size:13px;
  z-index:9999;
  display:none;
}

/* EDIT PANEL */
#editPanel{
  position:fixed;
  bottom:-100%;
  left:0;
  right:0;
  max-width:400px;
  margin:auto;
  background:#243b55;
  padding:20px;
  transition:0.3s;
  z-index:3000;
  border-radius:10px 10px 0 0;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h3>Admin Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="sidebar" id="sidebar">
  <a onclick="showForm()">➕ Add Record</a>
  <a onclick="showTable()">📊 View Records</a>
  <a onclick="showChart()">📈 Chart</a>
  <a onclick="downloadPDF()">🧾 Download PDF</a>
  <a onclick="logout()">🚪 Logout</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<header>
  <img src="akura.jpg" class="logo">
  <h3 style="color:#0bf">AKURA GENERAL ENTERPRISE</h3>
  <h4>CASHBOOK</h4>
</header>

<!-- FORM -->
<div class="container" id="formPage">
  <input id="customer" placeholder="Name">
  <input id="product" placeholder="Product">
  <input id="amount" type="number" placeholder="Amount ₦">
  <input id="paid" type="number" placeholder="Paid ₦">
  <button onclick="saveData()">Save</button>
</div>

<!-- TABLE -->
<div class="table-page" id="tablePage">

<div class="dashboard">
  <div style="background:green;color:#fff" class="card">Total Paid<br><b id="tPaid">₦0</b></div>
  <div style="background:red;color:#fff" class="card">Total Debt<br><b id="tDebt">₦0</b></div>
</div>

<div class="top-bar">
  <input id="search" style="background:#fff;color:black;" placeholder="Search..." onkeyup="searchTable()">
  <button style="background:orange;color:#fff;border-radius:20px" onclick="sortAZ()">A-Z</button>
  <button style="background:grey;color:#fff;border-radius:20px" onclick="loadData()">RESET</button>
</div>

<div class="table-scroll">
<table>
<thead style="background:navy;color:#fff">
<tr>
<th>SN</th><th>NAME</th><th>PRODUCT</th><th>AMOUNT</th><th>PAID</th><th>DEBT</th><th>TOTAL</th><th>DATE</th><th>ACTION</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<!-- CHART -->
<div class="chart-page" id="chartPage">
<canvas id="chart"></canvas>
</div>

</div>

<!-- EDIT PANEL -->
<div id="editPanel">
<h3>Edit Debt</h3>
<input id="editDebtInput" type="number" placeholder="Enter Debt ₦">
<button onclick="saveDebt()">Save</button>
<button onclick="closePanel()" style="background:red">Cancel</button>
</div>

<script>
const ADMIN_USER="Admin";
const ADMIN_PASS="1234";

const loginPage=document.getElementById("loginPage");
const app=document.getElementById("app");

let records=JSON.parse(localStorage.getItem("records"))||[];

if(localStorage.getItem("login")==="true"){
  loginPage.style.display="none";
  app.style.display="block";
}

function login(){
  if(user.value===ADMIN_USER && pass.value===ADMIN_PASS){
    localStorage.setItem("login","true");
    location.reload();
  }else alert("Wrong login");
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

/* KEEP YOUR ORIGINAL JS BELOW (unchanged) */
</script>

</body>
  </html>
