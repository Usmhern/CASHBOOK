<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKURA GENERAL ENTERPRISE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:#141e30; color:#fff; min-height:100vh; overflow-x: hidden; }

        /* Auth Pages */
        #loginPage { 
            display: flex; height: 100vh; justify-content: center; align-items: center; 
            background: linear-gradient(to right, #141e30, #243b55);
        }
        .login-box { background:#1c2e4a; padding:30px; border-radius:12px; width:320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* App Structure */
        #app { display: none; }
        .page { display: none; padding: 20px; padding-top: 90px; max-width: 900px; margin: auto; }
        .active-page { display: block; }
.page { 
    //display: none; 
    padding: 20px; 
    padding-top: 170px; /* Increased from 90px to 140px */
    max-width: 900px; 
    margin: auto; 
}
        
        /* Header & Sidebar */
        header { 
    position: fixed; 
    top: 0; 
    width: 100%; 
    background: #000; 
    padding: 10px; 
    text-align: center; 
    z-index: 1000; 
    border-bottom: 2px solid #00c6ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px; /* Space between logo, name, and cashbook */
}

.main-logo {
    width: 100px; /* Adjust size as needed */
    height: 80px;
    margin-bottom: 5px;
}

.sub-heading {
    color: #ffffff;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 2px;
    margin: 0;
}
        
        .menu-btn { 
            position: fixed; top: 60px; left: 17px; z-index: 1100; 
            font-size: 25px; cursor: pointer; background: #00c6ff; 
            padding: 5px 12px; border-radius: 4px; color: #000;
        }
        .sidebar { 
            position: fixed; top: 0; left: -260px; width: 260px; height: 100%; 
            background: #0a0f18; transition: 0.3s; z-index: 1500; padding-top: 60px; 
            border-right: 1px solid #333;
        }
        .sidebar a { 
            display: block; padding: 15px 25px; color: #fff; 
            text-decoration: none; border-bottom: 1px solid #1a1a1a; cursor: pointer;
        }
        .sidebar a:hover { background: #00c6ff; color: #000; }
        .overlay { 
            position: fixed; top:0; left:0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; z-index: 1400; 
        }

        /* Forms & Inputs */
        .container { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 10px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; 
            border: 1px solid #333; background: #0a0f18; color: #fff; 
        }
        button { 
            width: 100%; padding: 12px; background: #00c6ff; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:hover { opacity: 0.8; }

        /* Table Dashboard */
        .dashboard { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { flex: 1; background: #fff; color: #000; padding: 15px; border-radius: 8px; text-align: center; }
        .table-wrap { overflow-x: auto; background: #fff; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; color: #000; min-width: 600px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 13px; }
        th { background: #243b55; color: #fff; }

        /* Action Buttons */
        .btn-edit { background: #eee; color: #fff; padding: 5px 10px; width: auto; margin-right: 5px; }
        .btn-del { background: #eee; color: #fff; padding: 5px 10px; width: auto; }

        /* Modal */
        #editModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c2e4a; padding: 25px; border-radius: 12px; z-index: 2000;
            display: none; width: 90%; max-width: 350px; border: 1px solid #00c6ff;
        }

        #toast {
            position: fixed; top: 50px; right: 40px; padding: 15px 25px; 
            border-radius: 5px; display: none; z-index: 3000; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="loginPage">
    <div class="login-box">
        <h2 style="text-align:center; margin-bottom:20px;">Admin Login</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>
</div>

<div id="app">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>

    <div class="sidebar" id="sidebar">
        <a onclick="showPage('formPage')">➕ Add New Record</a>
        <a onclick="showPage('tablePage')">📊 View Records</a>
        <a onclick="showPage('chartPage')">📈 Statistics Chart</a>
        <a onclick="downloadPDF()">🧾 Download PDF Report</a>
        <a onclick="logout()" style="color: #ff4d4d; margin-top: 20px;">🚪 Logout</a>
    </div>

<header>
    <img src="akura.jpg" alt="AKURA" class="main-logo">
    <h3 style="color:#00c6ff; margin: 0;">AKURA GENERAL ENTERPRISE</h3>
    <p class="sub-heading">CASHBOOK</p>
</header>


    <div id="formPage" class="page">
        <div class="container">
            <h3>REGISTER SALE</h3>
            <input id="custName" placeholder="Customer Name">
            <input id="prodName" placeholder="Service">
            <input id="totalAmt" type="number" placeholder="Total Amount (₦)">
            <input id="paidAmt" type="number" placeholder="Amount Paid (₦)">
            <button onclick="saveRecord()">SAVE RECORD</button>
        </div>
    </div>

    <div id="tablePage" class="page">
        <div class="dashboard">
            <div class="card">Total Paid<br><b id="sumPaid" style="color:green">₦0</b></div>
            <div class="card">Total Debt<br><b id="sumDebt" style="color:red">₦0</b></div>
        </div>
        <input id="searchBox" placeholder="Search by name or product..." onkeyup="filterTable()">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>SN</th><th>NAME</th><th>SERVICE</th><th>TOTAL</th><th>PAID</th><th>DEBT</th><th>DATE</th><th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="chartPage" class="page">
        <div class="container" style="background:white; max-width: 450px;">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<div id="editModal">
    <h3>Update Debt</h3>
    <p id="editLabel" style="font-size:12px; margin-top:5px; color:#aaa;"></p>
    <input id="newDebtInput" type="number" placeholder="Enter Remaining Debt">
    <button onclick="confirmEdit()">UPDATE</button>
    <button onclick="closeEdit()" style="background:#444; color:white;">CANCEL</button>
</div>

<script>
    const AUTH_USER = "Admin";
    const AUTH_PASS = "1234";
    let records = JSON.parse(localStorage.getItem("akura_records")) || [];
    let editIdx = null;
    let chartObj = null;

    // Toast Logic
    function toast(msg, bg="#00c853") {
        const t = document.getElementById("toast");
        t.innerText = msg; t.style.background = bg; t.style.display = "block";
        setTimeout(() => t.style.display="none", 2500);
    }

    // Auth Logic
    if(localStorage.getItem("isLoggedIn") === "true") loginDone();

    function login() {
        if(user.value === AUTH_USER && pass.value === AUTH_PASS) {
            localStorage.setItem("isLoggedIn", "true");
            loginDone();
        } else { alert("Invalid Credentials"); }
    }

    function loginDone() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";
        showPage('tablePage');
    }

    function logout() {
        localStorage.removeItem("isLoggedIn");
        location.reload();
    }

    // Navigation
    function toggleMenu(open) {
        document.getElementById("sidebar").style.left = open ? "0" : "-260px";
        document.getElementById("overlay").style.display = open ? "block" : "none";
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        toggleMenu(false);
        if(id === 'tablePage') renderTable();
        if(id === 'chartPage') renderChart();
    }

    // Data Actions
    function saveRecord() {
        const total = Number(totalAmt.value);
        const paid = Number(paidAmt.value);
        if(!custName.value || total <= 0) return alert("Please enter valid details");

        records.push({
            name: custName.value,
            product: prodName.value,
            total: total,
            paid: paid,
            debt: total - paid,
            date: new Date().toLocaleDateString()
        });

        localStorage.setItem("akura_records", JSON.stringify(records));
        custName.value = prodName.value = totalAmt.value = paidAmt.value = "";
        toast("Record Saved!");
        showPage('tablePage');
    }

    function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        let sPaid = 0, sDebt = 0;

        records.forEach((r, i) => {
            sPaid += r.paid; sDebt += r.debt;
            tbody.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td>${r.name}</td>
                    <td>${r.product}</td>
                    <td>₦${r.total}</td>
                    <td>₦${r.paid}</td>
                    <td style="color:${r.debt > 0 ? 'red' : 'green'}">₦${r.debt}</td>
                    <td>${r.date}</td>
                    <td>
                        <button class="btn-edit" onclick="openEdit(${i})">✏️</button>
                        <button class="btn-del" onclick="removeRec(${i})">❌</button>
                    </td>
                </tr>`;
        });
        document.getElementById("sumPaid").innerText = "₦" + sPaid;
        document.getElementById("sumDebt").innerText = "₦" + sDebt;
    }

    // Edit Debt Logic
    function openEdit(i) {
        editIdx = i;
        document.getElementById("editLabel").innerText = `Updating record for ${records[i].name}`;
        document.getElementById("newDebtInput").value = records[i].debt;
        document.getElementById("editModal").style.display = "block";
        document.getElementById("overlay").style.display = "block";
    }

    function closeEdit() {
        document.getElementById("editModal").style.display = "none";
        toggleMenu(false);
    }

    function confirmEdit() {
        const newDebt = Number(newDebtInput.value);
        let r = records[editIdx];
        
        // When debt is reduced, the amount "Paid" increases.
        r.debt = newDebt;
        r.paid = r.total - newDebt;

        localStorage.setItem("akura_records", JSON.stringify(records));
        closeEdit();
        renderTable();
        toast("✓ Debt Updated", "orange");
    }

    function removeRec(i) {
        if(confirm("Permanently delete this record?")) {
            records.splice(i, 1);
            localStorage.setItem("akura_records", JSON.stringify(records));
            renderTable();
            toast("X Deleted", "red");
        }
    }

    function filterTable() {
        let val = searchBox.value.toLowerCase();
        document.querySelectorAll("#tableBody tr").forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }

    // PDF Generator
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(20);
        doc.text("AKURA GENERAL ENTERPRISE", 105, 15, { align: "center" });
        doc.setFontSize(10);
        doc.text(`Official Sales Report - ${new Date().toLocaleDateString()}`, 105, 22, { align: "center" });

        const data = records.map((r, i) => [i+1, r.name, r.product, `N${r.total}`, `N${r.paid}`, `N${r.debt}`, r.date]);
        
        doc.autoTable({
            startY: 30,
            head: [['SN', 'CUSTOMER', 'SERVICE', 'TOTAL', 'PAID', 'DEBT', 'DATE']],
            body: data,
            theme: 'grid',
            headStyles: { fillColor: [20, 198, 255], textColor: [0,0,0] }
        });

        doc.save("Akura_Report.pdf");
        toast(",✓ PDF Downloaded", "blue");
        toggleMenu(false);
    }

    function renderChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        let p = 0, d = 0;
        records.forEach(r => { p += r.paid; d += r.debt; });

        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Total Income', 'Total Debt'],
                datasets: [{ data: [p, d], backgroundColor: ['#00c853', '#e74c3c'] }]
            }
        });
    }
</script>
</body>
</html>
